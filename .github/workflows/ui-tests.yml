name: Ручная проверка интерфейса

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  launcher-ui:
    name: Windows UI smoke
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Настройка .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Сборка
        run: dotnet build Ven4Tools.sln -c Release --nologo -v minimal -warnaserror

      - name: UI smoke и snapshot
        run: dotnet test tests/Ven4Tools.UITests/Ven4Tools.UITests.csproj -c Release -p:Platform=x64 --no-build --no-restore --nologo --logger "trx;LogFileName=ui-tests.trx" --results-directory TestResults/UI

      - name: Диагностика падения
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: launcher-ui-failure
          path: |
            TestResults/**/*.trx
            TestResults/**/*.actual.png
          if-no-files-found: warn
