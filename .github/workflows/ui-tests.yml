name: Ручная проверка интерфейса

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  launcher-ui:
    name: Windows UI smoke
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Настройка .NET 8
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '8.0.x'

      - name: Сборка
        run: dotnet build Ven4Tools.sln -c Release --nologo -v minimal -warnaserror

      - name: Разрешение экрана раннера под окна лаунчера/клиента
        shell: pwsh
        run: ./tests/scripts/set_ci_display_resolution.ps1

      - name: UI smoke и snapshot (лаунчер)
        run: dotnet test tests/Ven4Tools.UITests/Ven4Tools.UITests.csproj -c Release -p:Platform=x64 --no-build --no-restore --nologo --logger "trx;LogFileName=ui-tests.trx" --results-directory TestResults/UI

      - name: UI-тесты клиента
        run: dotnet test Ven4Tools.ClientUITests/Ven4Tools.ClientUITests.csproj -c Release -p:Platform=x64 --no-build --no-restore --nologo --logger "trx;LogFileName=client-ui-tests.trx" --results-directory TestResults/ClientUI

      - name: Диагностика падения
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ui-failure
          path: |
            TestResults/**/*.trx
            TestResults/**/*.actual.png
          if-no-files-found: warn
