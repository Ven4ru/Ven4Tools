name: Проверка качества

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  quality:
    name: Сборка и тесты
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Настройка .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '8.0.x'

      - name: Восстановление зависимостей
        run: dotnet restore Ven4Tools.sln --nologo

      - name: Сборка solution
        run: dotnet build Ven4Tools.sln -c Release --no-restore --nologo -v minimal -warnaserror

      - name: Быстрые unit-тесты
        run: dotnet test tests/Ven4Tools.Tests/Ven4Tools.Tests.csproj -c Release -p:Platform=x64 -p:CollectCoverage=true --no-build --no-restore --nologo --logger "trx;LogFileName=unit-tests.trx" --results-directory TestResults/Unit

      - name: Проверка уязвимых NuGet-зависимостей
        shell: pwsh
        run: |
          $json = dotnet list Ven4Tools.sln package --vulnerable --include-transitive --format json | Out-String | ConvertFrom-Json
          $vulnerable = @(
            $json.projects.frameworks.topLevelPackages
            $json.projects.frameworks.transitivePackages
          ) | Where-Object { $_.vulnerabilities.Count -gt 0 }
          if ($vulnerable.Count -gt 0) {
            $vulnerable | Format-Table id, resolvedVersion
            throw "Обнаружены уязвимые NuGet-зависимости."
          }

      - name: Артефакты неуспешных тестов
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-failures
          path: |
            TestResults/**/*.trx
            TestResults/Coverage/**
          if-no-files-found: warn
