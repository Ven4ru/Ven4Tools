name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '30 4 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Анализ CodeQL (C#)
    runs-on: windows-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Настройка .NET 8
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '8.0.x'

      - name: Инициализация CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: csharp

      - name: Восстановление зависимостей
        run: dotnet restore Ven4Tools.sln --nologo

      - name: Сборка solution (под наблюдением CodeQL)
        run: dotnet build Ven4Tools.sln -c Release --no-restore --nologo

      - name: Анализ CodeQL
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          category: "/language:csharp"
