name: Релиз лаунчера

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия лаунчера без префикса (например 2.1.0)'
        required: true
        default: '2.1.0'
      local_check:
        description: 'Введите RELEASE-APPROVED после полного локального прохода'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Сборка launcher release
    runs-on: windows-latest
    env:
      # Значения из inputs передаются только через env — НЕ подставлять их как
      # `${{ inputs.* }}` напрямую в текст run:-скриптов ниже: текстовая подстановка
      # происходит ДО того, как PowerShell что-либо парсит, поэтому валидация формата
      # версии ниже не защищает от инъекции, если значение сначала склеивается в
      # исходный код скрипта. Через env: значение приходит как обычная строka
      # переменной окружения, а не как часть текста скрипта.
      RELEASE_VERSION: ${{ inputs.version }}
      RELEASE_LOCAL_CHECK: ${{ inputs.local_check }}

    steps:
      - name: Проверка release gate
        shell: pwsh
        run: |
          if ($env:RELEASE_LOCAL_CHECK -ne "RELEASE-APPROVED") {
            throw "Релиз запрещён: полный локальный проход лаунчера не подтверждён."
          }
          if ($env:RELEASE_VERSION -notmatch '^\d+\.\d+\.\d+$') {
            throw "Версия должна иметь формат X.Y.Z."
          }

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Настройка .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '8.0.x'

      - name: Восстановление зависимостей
        run: dotnet restore Ven4Tools.sln --nologo

      - name: Сборка и unit-тесты с coverage gate
        run: |
          dotnet build Ven4Tools.sln -c Release --no-restore --nologo -v minimal -warnaserror
          dotnet test tests/Ven4Tools.Tests/Ven4Tools.Tests.csproj -c Release -p:Platform=x64 -p:CollectCoverage=true --no-build --no-restore --nologo

      - name: Публикация launcher exe
        shell: pwsh
        run: |
          # Публикуемый exe — только вход для NSIS-упаковки, отдельным ассетом
          # релиза он не становится: самообновление и первая установка идут
          # через единственный Ven4Tools.Setup-X.Y.Z.exe (см. build_installer.ps1).
          dotnet publish Ven4Tools.Launcher/Ven4Tools.Launcher.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:Version=$env:RELEASE_VERSION `
            -o _release/launcher_publish `
            --nologo

      - name: Установка NSIS
        shell: pwsh
        # Версия закреплена: этот шаг работает в job с contents: write (публикует
        # релиз), незапиненная choco install nsis -y тянула бы любую версию,
        # какая окажется текущей в фиде на момент запуска (MEDIUM-находка
        # аудита безопасности 2026-07-13). Chocolatey сам проверяет контрольную
        # сумму пакета при установке — пиннинг версии здесь фиксирует ещё и
        # воспроизводимость сборки.
        run: choco install nsis --version=3.12.0 -y --no-progress

      - name: Сборка Setup
        shell: pwsh
        run: |
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          & $makensis `
            /INPUTCHARSET UTF8 `
            "/DVERSION=$env:RELEASE_VERSION" `
            "/DPUBLISH_DIR=$pwd\_release\launcher_publish" `
            "/DOUTFILE=$pwd\_release\Ven4Tools.Setup-${env:RELEASE_VERSION}.exe" `
            "installer\Ven4Tools.Setup.nsi"
          if ($LASTEXITCODE -ne 0) {
            throw "NSIS завершился с кодом $LASTEXITCODE."
          }

      - name: Тихая установка и проверка Setup
        shell: pwsh
        run: |
          $setup = Resolve-Path "_release/Ven4Tools.Setup-${env:RELEASE_VERSION}.exe"
          $process = Start-Process `
            -FilePath $setup `
            -ArgumentList '/S' `
            -WindowStyle Hidden `
            -Wait `
            -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Setup завершился с кодом $($process.ExitCode)."
          }
          ./tests/scripts/verify_launcher_install.ps1 -ExpectedVersion $env:RELEASE_VERSION

      - name: Разрешение экрана раннера под окно лаунчера
        shell: pwsh
        run: ./tests/scripts/set_ci_display_resolution.ps1

      - name: UI smoke установленного launcher
        shell: pwsh
        run: |
          $env:LAUNCHER_UNDER_TEST = Join-Path `
            $env:LOCALAPPDATA `
            "Ven4Tools\Launcher\Ven4Tools.Launcher.exe"
          dotnet test tests/Ven4Tools.UITests/Ven4Tools.UITests.csproj `
            -c Release -p:Platform=x64 --no-build --no-restore --nologo

      - name: Контрольные суммы
        shell: pwsh
        run: |
          Get-FileHash "_release/Ven4Tools.Setup-${env:RELEASE_VERSION}.exe" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  Ven4Tools.Setup-${env:RELEASE_VERSION}.exe" } |
            Set-Content "_release/SHA256SUMS.txt" -Encoding ascii

      - name: Создание черновика отдельного launcher-релиза
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "launcher-v$env:RELEASE_VERSION" `
            "_release/Ven4Tools.Setup-${env:RELEASE_VERSION}.exe" `
            "_release/SHA256SUMS.txt" `
            --title "Ven4Tools Launcher $env:RELEASE_VERSION" `
            --generate-notes `
            --draft
