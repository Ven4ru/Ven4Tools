name: Релиз клиента

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия (например 3.4.7)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Сборка и публикация релиза
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Настройка .NET 8
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '8.0.x'

      # Публикация релиза раньше не имела собственного security/quality gate:
      # job с contents: write мог опубликовать сборку по тегу без тестов и без
      # проверки уязвимых зависимостей (MEDIUM-находка аудита безопасности
      # 2026-07-13). build.yml гоняет это же на каждый push/PR в main, но тег
      # может указывать на коммит, для которого тот прогон уже устарел или не
      # проводился (например ручной workflow_dispatch на произвольном коммите).
      - name: Восстановление зависимостей
        run: dotnet restore Ven4Tools.sln --nologo

      - name: Сборка solution
        run: dotnet build Ven4Tools.sln -c Release --no-restore --nologo -v minimal -warnaserror

      - name: Быстрые unit-тесты
        run: dotnet test tests/Ven4Tools.Tests/Ven4Tools.Tests.csproj -c Release -p:Platform=x64 --no-build --no-restore --nologo

      - name: Проверка уязвимых NuGet-зависимостей
        shell: pwsh
        run: |
          $json = dotnet list Ven4Tools.sln package --vulnerable --include-transitive --format json | Out-String | ConvertFrom-Json
          $vulnerable = @(
            $json.projects.frameworks.topLevelPackages
            $json.projects.frameworks.transitivePackages
          ) | Where-Object { $_.vulnerabilities.Count -gt 0 }
          if ($vulnerable.Count -gt 0) {
            $vulnerable | Format-Table id, resolvedVersion
            throw "Обнаружены уязвимые NuGet-зависимости."
          }

      - name: Получить версию
        id: ver
        shell: pwsh
        env:
          # Через env, не как "${{ ... }}" в теле скрипта — иначе значение
          # склеивается в исходный код run:-блока ДО того, как PowerShell
          # его парсит, и проверка формата ниже не защищает от инъекции.
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if ($env:EVENT_NAME -eq "push") {
            $ver = $env:REF_NAME.TrimStart('v')
          } else {
            $ver = $env:INPUT_VERSION.TrimStart('v')
          }
          if ($ver -notmatch '^[0-9]+\.[0-9]+\.[0-9]+$') {
            throw "Некорректный формат версии: '$ver' (ожидается X.Y.Z)."
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "TAG=v$ver" >> $env:GITHUB_OUTPUT

      - name: Публикация
        shell: pwsh
        run: |
          dotnet publish Ven4Tools/Ven4Tools.csproj `
            -c Release -r win-x64 --self-contained true `
            -o _release/client_${{ steps.ver.outputs.VERSION }} `
            --nologo

      - name: Создать ZIP
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "_release/client_${{ steps.ver.outputs.VERSION }}/*" `
            -DestinationPath "_release/Ven4Tools-Client-${{ steps.ver.outputs.VERSION }}.zip"

      - name: Создать черновик релиза
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exists = gh release view ${{ steps.ver.outputs.TAG }} 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Релиз ${{ steps.ver.outputs.TAG }} уже существует — загружаем ассет"
            gh release upload ${{ steps.ver.outputs.TAG }} `
              "_release/Ven4Tools-Client-${{ steps.ver.outputs.VERSION }}.zip" `
              --clobber
          } else {
            gh release create ${{ steps.ver.outputs.TAG }} `
              "_release/Ven4Tools-Client-${{ steps.ver.outputs.VERSION }}.zip" `
              --title "Ven4Tools ${{ steps.ver.outputs.VERSION }}" `
              --generate-notes `
              --draft `
              --latest
          }
