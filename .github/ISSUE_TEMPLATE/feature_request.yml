name: 💡 Предложить идею
description: Предложение новой функции или улучшения
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Перед тем как предложить идею — проверьте [существующие issues](https://github.com/Ven4ru/Ven4Tools/issues), возможно, её уже предлагали.

  - type: textarea
    id: problem
    attributes:
      label: Какую проблему это решает
      description: Что сейчас неудобно или невозможно сделать
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Предлагаемое решение
      description: Как, по-вашему, это должно работать
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Рассмотренные альтернативы
      description: Другие способы решить ту же проблему, если приходили в голову

  - type: textarea
    id: additional
    attributes:
      label: Дополнительный контекст
      description: Скриншоты, ссылки на похожие реализации в других приложениях и т.п.
