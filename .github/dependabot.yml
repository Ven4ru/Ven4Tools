version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # v4+ требует платной лицензии Six Labors — проект использует бесплатную
      # v3.x, апгрейд мажора невозможен без покупки лицензии.
      - dependency-name: "SixLabors.ImageSharp"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
